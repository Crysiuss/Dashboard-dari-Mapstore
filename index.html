<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard WebGIS Kabupaten Sleman</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      .webgis-container {
        width: 100%;
        height: 100vh;
        border: none;
      }
      .webgis-container iframe {
      margin-top: -50px; 
      width: calc(100% + 40px); 
      height: calc(100vh + 50px);
      }
      .Merah {
      background: linear-gradient(135deg, #800000 0%, #4a0000 100%);
      color: #ffffff;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      border-bottom: 4px solid #b30000; /* Aksen warna merah lebih terang di bawah */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .Merah h1 {
          margin: 0;
          font-size: 28px;
          letter-spacing: 1px;
          text-transform: uppercase;
          text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
    </style>
    <h1 class="Merah"><center>Dashboard WebGIS Kepadatan Kabupaten Sleman</center></h1>
  </head>
  <body class="Merah">
    <div> 
    <center>
      <iframe src="http://localhost:7080/mapstore/#/dashboard/23" class="webgis-container" > </iframe>
    </center>
    </div>
    </body>
  </body>
</html>
